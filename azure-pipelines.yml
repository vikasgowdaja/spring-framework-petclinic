# Maven package Java project Web App to Linux on Azure
# Build your Java project and deploy it to Azure as a Linux web app
# Add steps that analyze code, save build artifacts, deploy, and more:
# https://docs.microsoft.com/azure/devops/pipelines/languages/java

trigger:
- main

variables:

  # Azure Resource Manager connection created during pipeline creation
  azureSubscription: '84abe73f-b7a2-416e-878d-5e116616cae6'

  # Web app name
  webAppName: 'petclinic-1777103169'

  # Environment name
  environmentName: 'petclinic-1777103169'

  # Public app URL for post-deploy CSS verification
  webAppUrl: 'https://petclinic-1777103169.azurewebsites.net'

  # Agent VM image name
  vmImageName: 'ubuntu-latest'

stages:
- stage: Build
  displayName: Build stage
  jobs:
  - job: MavenPackageAndPublishArtifacts
    displayName: Maven Package and Publish Artifacts
    pool:
      vmImage: $(vmImageName)

    steps:
    - task: Maven@4
      displayName: 'Maven Package'
      inputs:
        mavenPomFile: 'pom.xml'
        mavenOptions: '-Xmx3072m'
        javaHomeOption: 'JDKVersion'
        jdkVersionOption: '1.17' 
        jdkArchitectureOption: 'x64'
        publishJUnitResults: true
        testResultsFiles: '**/surefire-reports/TEST-*.xml'
        goals: '-PH2,css clean package'

    - task: CopyFiles@2
      displayName: 'Copy Files to artifact staging directory'
      inputs:
        SourceFolder: '$(System.DefaultWorkingDirectory)'
        Contents: '**/target/*.?(war|jar)'
        TargetFolder: $(Build.ArtifactStagingDirectory)

    - script: |
        set -euo pipefail
        WAR_PATH="$(Build.SourcesDirectory)/target/petclinic.war"
        test -f "$WAR_PATH"
        unzip -p "$WAR_PATH" resources/css/petclinic.css | grep -q '#0b5f2a'
        if unzip -p "$WAR_PATH" resources/css/petclinic.css | grep -Eq '#ff0000|#7a0000'; then
          echo "ERROR: Red theme tokens detected in WAR CSS."
          exit 1
        fi
      displayName: 'Verify WAR CSS before publish'

    - upload: $(Build.ArtifactStagingDirectory)
      artifact: drop

- stage: Deploy
  displayName: Deploy stage
  dependsOn: Build
  condition: succeeded()
  jobs:
  - deployment: DeployLinuxWebApp
    displayName: Deploy Linux Web App
    environment: $(environmentName)
    pool:
      vmImage: $(vmImageName)
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureWebApp@1
            displayName: 'Azure Web App Deploy: petclinic-1777103169'
            inputs:
              azureSubscription: $(azureSubscription)
              appType: webAppLinux
              appName: $(webAppName)
              package: '$(Pipeline.Workspace)/drop/**/target/*.?(war|jar)'

          - task: AzureCLI@2
            displayName: 'Restart Web App after deploy'
            inputs:
              azureSubscription: $(azureSubscription)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail
                RG_NAME="$(az resource list --name "$(webAppName)" --resource-type "Microsoft.Web/sites" --query '[0].resourceGroup' -o tsv)"
                test -n "$RG_NAME"
                echo "Restarting $(webAppName) in resource group $RG_NAME"
                az webapp restart --name "$(webAppName)" --resource-group "$RG_NAME"

          - script: |
              set -euo pipefail
              CSS_URL="$(webAppUrl)/resources/css/petclinic.css"
              for i in $(seq 1 18); do
                CSS_CONTENT="$(curl -fsSL -H 'Cache-Control: no-cache' -H 'Pragma: no-cache' "${CSS_URL}?v=$(Build.BuildId)-${i}")"
                if grep -q '#0b5f2a' <<< "$CSS_CONTENT" && ! grep -Eq '#ff0000|#7a0000' <<< "$CSS_CONTENT"; then
                  echo "Live CSS verification passed on attempt $i."
                  exit 0
                fi
                echo "Live CSS not updated yet (attempt $i/18). Retrying..."
                sleep 10
              done
              echo "ERROR: Live site is still serving unexpected CSS."
              exit 1
            displayName: 'Verify live site CSS'
