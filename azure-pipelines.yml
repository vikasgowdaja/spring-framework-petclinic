# Maven package Java project Web App to Linux on Azure
# Build your Java project and deploy it to Azure as a Linux web app
# Add steps that analyze code, save build artifacts, deploy, and more:
# https://docs.microsoft.com/azure/devops/pipelines/languages/java

trigger:
- main

variables:

  # Azure Resource Manager connection created during pipeline creation
  azureSubscription: '744e3b8f-dfa4-4b16-84d4-ca2a226bf569'

  # Web app name
  webAppName: 'petclinic-1777103169'

  # Environment name
  environmentName: 'petclinic-1777103169'

  # Public app URL for post-deploy validation
  webAppUrl: 'https://petclinic-1777103169.azurewebsites.net'

  # Agent VM image name
  vmImageName: 'ubuntu-latest'

stages:
- stage: Build
  displayName: Build stage
  jobs:
  - job: MavenPackageAndPublishArtifacts
    displayName: Maven Package and Publish Artifacts
    pool:
      vmImage: $(vmImageName)

    steps:
    - task: Maven@4
      displayName: 'Maven Package'
      inputs:
        mavenPomFile: 'pom.xml'
        mavenOptions: '-Xmx3072m'
        javaHomeOption: 'JDKVersion'
        jdkVersionOption: '1.21'
        jdkArchitectureOption: 'x64'
        publishJUnitResults: true
        testResultsFiles: '**/surefire-reports/TEST-*.xml'
        goals: '-PH2,css clean package'

    - script: |
        set -euo pipefail
        WAR_PATH="$(Build.SourcesDirectory)/target/petclinic.war"
        test -f "$WAR_PATH"
        CSS_CONTENT="$(unzip -p "$WAR_PATH" resources/css/petclinic.css)"

        # Require expected green theme token.
        echo "$CSS_CONTENT" | grep -q '#0b5f2a'

        # Block deployment if known red theme tokens are present.
        if echo "$CSS_CONTENT" | grep -Eq '#ff0000|#7a0000'; then
          echo "ERROR: Red theme tokens detected in WAR CSS."
          exit 1
        fi
      displayName: 'Verify WAR CSS is green and not red'

    - script: |
        set -euo pipefail
        WAR_PATH="$(Build.SourcesDirectory)/target/petclinic.war"
        test -f "$WAR_PATH"
        sha256sum "$WAR_PATH" | tee "$(Build.SourcesDirectory)/target/petclinic.war.sha256"
      displayName: 'Record WAR checksum'

    - task: CopyFiles@2
      displayName: 'Copy Files to artifact staging directory'
      inputs:
        SourceFolder: '$(Build.SourcesDirectory)/target'
        Contents: |
          petclinic.war
          petclinic.war.sha256
        TargetFolder: $(Build.ArtifactStagingDirectory)

    - upload: $(Build.ArtifactStagingDirectory)
      artifact: drop

- stage: Deploy
  displayName: Deploy stage
  dependsOn: Build
  condition: succeeded()
  jobs:
  - deployment: DeployLinuxWebApp
    displayName: Deploy Linux Web App
    environment: $(environmentName)
    pool:
      vmImage: $(vmImageName)
    strategy:
      runOnce:
        deploy:
          steps:
          - download: current
            artifact: drop
            displayName: 'Download build artifact'

          - script: |
              set -euo pipefail
              ARTIFACT_WAR="$(Pipeline.Workspace)/drop/petclinic.war"
              test -f "$ARTIFACT_WAR"
              ls -lah "$(Pipeline.Workspace)/drop"
              sha256sum "$ARTIFACT_WAR"
              unzip -p "$ARTIFACT_WAR" resources/css/petclinic.css | grep -q '#0b5f2a'
            displayName: 'Inspect artifact before deploy'

          - task: AzureWebApp@1
            displayName: 'Azure Web App Deploy: petclinic-1777103169'
            inputs:
              azureSubscription: $(azureSubscription)
              appType: webAppLinux
              appName: $(webAppName)
              package: '$(Pipeline.Workspace)/drop/petclinic.war'

          - task: AzureCLI@2
            displayName: 'Restart Web App after deploy'
            inputs:
              azureSubscription: $(azureSubscription)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail
                RG_NAME="$(az webapp list --query \"[?name=='$(webAppName)'].resourceGroup | [0]\" -o tsv)"
                test -n "$RG_NAME"
                echo "Restarting $(webAppName) in resource group $RG_NAME"
                az webapp restart --name "$(webAppName)" --resource-group "$RG_NAME"

          - script: |
              set -euo pipefail
              CSS_URL="$(webAppUrl)/resources/css/petclinic.css"
              ATTEMPTS=36
              SLEEP_SECONDS=10

              for i in $(seq 1 $ATTEMPTS); do
                CSS_CONTENT="$(curl -fsSL -H 'Cache-Control: no-cache' -H 'Pragma: no-cache' "${CSS_URL}?v=$(Build.BuildId)-${i}")"
                if echo "$CSS_CONTENT" | grep -q '#0b5f2a' && ! echo "$CSS_CONTENT" | grep -Eq '#ff0000|#7a0000'; then
                  echo "Live CSS verification passed on attempt $i."
                  exit 0
                fi

                echo "Live CSS not updated yet (attempt $i/$ATTEMPTS). Retrying..."
                sleep "$SLEEP_SECONDS"
              done

              echo "ERROR: Live site is still not serving expected green CSS."
              echo "Recent token hints from live CSS:"
              echo "$CSS_CONTENT" | grep -Eo '#0b5f2a|#ff0000|#7a0000' | sort | uniq -c || true
              exit 1
            displayName: 'Verify live site serves green CSS'