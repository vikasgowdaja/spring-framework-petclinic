# Maven package Java project Web App to Linux on Azure
# Build your Java project and deploy it to Azure as a Linux web app
# Add steps that analyze code, save build artifacts, deploy, and more:
# https://docs.microsoft.com/azure/devops/pipelines/languages/java

trigger:
- main

variables:

  # Azure Resource Manager connection created during pipeline creation
  azureSubscription: '744e3b8f-dfa4-4b16-84d4-ca2a226bf569'

  # Web app name
  webAppName: 'petclinic-1777103169'

  # Environment name
  environmentName: 'petclinic-1777103169'

  # Agent VM image name
  vmImageName: 'ubuntu-latest'

stages:
- stage: Build
  displayName: Build stage
  jobs:
  - job: MavenPackageAndPublishArtifacts
    displayName: Maven Package and Publish Artifacts
    pool:
      vmImage: $(vmImageName)

    steps:
    - task: Maven@4
      displayName: 'Maven Package'
      inputs:
        mavenPomFile: 'pom.xml'
        mavenOptions: '-Xmx3072m'
        javaHomeOption: 'JDKVersion'
        jdkVersionOption: '1.21'
        jdkArchitectureOption: 'x64'
        publishJUnitResults: true
        testResultsFiles: '**/surefire-reports/TEST-*.xml'
        goals: '-PH2,css clean package'

    - script: |
        set -euo pipefail
        WAR_PATH="$(Build.SourcesDirectory)/target/petclinic.war"
        test -f "$WAR_PATH"
        CSS_CONTENT="$(unzip -p "$WAR_PATH" resources/css/petclinic.css)"

        # Require expected green theme token.
        echo "$CSS_CONTENT" | grep -q '#0b5f2a'

        # Block deployment if known red theme tokens are present.
        if echo "$CSS_CONTENT" | grep -Eq '#ff0000|#7a0000'; then
          echo "ERROR: Red theme tokens detected in WAR CSS."
          exit 1
        fi
      displayName: 'Verify WAR CSS is green and not red'

    - task: CopyFiles@2
      displayName: 'Copy Files to artifact staging directory'
      inputs:
        SourceFolder: '$(Build.SourcesDirectory)/target'
        Contents: 'petclinic.war'
        TargetFolder: $(Build.ArtifactStagingDirectory)

    - upload: $(Build.ArtifactStagingDirectory)
      artifact: drop

- stage: Deploy
  displayName: Deploy stage
  dependsOn: Build
  condition: succeeded()
  jobs:
  - deployment: DeployLinuxWebApp
    displayName: Deploy Linux Web App
    environment: $(environmentName)
    pool:
      vmImage: $(vmImageName)
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureWebApp@1
            displayName: 'Azure Web App Deploy: petclinic-1777103169'
            inputs:
              azureSubscription: $(azureSubscription)
              appType: webAppLinux
              appName: $(webAppName)
              package: '$(Pipeline.Workspace)/drop/petclinic.war'